services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sniper-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - RUST_LOG=solana_sniper=info
      - PORT=8080
    ports:
      - "8088:8080"  # Exposed for direct API access (optional)
    expose:
      - "8080"       # Internal for Nginx
    networks:
      - sniper-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./sniper-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://sniper.logisspace.com/api
        - VITE_WS_URL=wss://sniper.logisspace.com/ws
        - VITE_RPC_ENDPOINT=${SOLANA_RPC_URL}
    container_name: sniper-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - sniper-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: sniper-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - sniper-net
    depends_on:
      - backend
      - frontend

networks:
  sniper-net:
    driver: bridge