services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sniper-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - RUST_LOG=solana_sniper=info
      # PORT=3013 comes from .env file
    ports:
      - "8088:3013"  # External 8088 → Internal 3013 (matches your .env)
    expose:
      - "3013"        # For Nginx internal communication
    networks:
      - sniper-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3013/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./sniper-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://sniper.logisspace.com/api
        - VITE_WS_URL=wss://sniper.logisspace.com/ws
        - VITE_RPC_ENDPOINT=${RPC_ENDPOINT}
        - VITE_HELIUS_KEY=${VITE_HELIUS_KEY}
    container_name: sniper-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - sniper-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: sniper-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - sniper-net
    depends_on:
      - backend
      - frontend

networks:
  sniper-net:
    driver: bridge