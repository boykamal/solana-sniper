version: '3.9'

services:

  # ── RUST BACKEND ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sniper-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - RUST_LOG=solana_sniper=info
      - PORT=8080
    ports:
      - "8080:8080"
    networks:
      - sniper-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── REACT FRONTEND ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./sniper-frontend
      dockerfile: Dockerfile
    container_name: sniper-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=
      - VITE_WS_URL=
      - VITE_RPC_ENDPOINT=
    networks:
      - sniper-net
    depends_on:
      - backend

  # ── NGINX REVERSE PROXY ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sniper-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - sniper-net
    depends_on:
      - backend
      - frontend

networks:
  sniper-net:
    driver: bridge
